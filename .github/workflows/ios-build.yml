name: ios-build

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/ios-build.yml"
      - "shared/**"
      - "ios/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate shared JVM module
        run: bash ./gradlew :shared:generateCommonMainWaterValveDbInterface :shared:compileKotlinJvm :shared:compileTestKotlinJvm :shared:jvmTest --no-daemon

      - name: Build shared iOS framework
        run: bash ./ios/BuildPhases/build-shared.sh

      - name: Run iOS logic tests
        run: swift test --package-path ios

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Static validation
        shell: pwsh
        run: ./ios/BuildPhases/validate-ios-static.ps1

      - name: Show project schemes
        run: xcodebuild -list -project ios/WaterValve.xcodeproj

      - name: Build simulator app
        run: |
          SIMULATOR_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ && /Shutdown/ { print $2; exit }')"
          if [ -z "$SIMULATOR_ID" ]; then
            echo "No available iPhone simulator found" >&2
            exit 1
          fi
          echo "SIMULATOR_ID=$SIMULATOR_ID" >> "$GITHUB_ENV"
          xcodebuild build \
            -project ios/WaterValve.xcodeproj \
            -scheme WaterValve \
            -configuration Debug \
            -destination "id=$SIMULATOR_ID" \
            -derivedDataPath "$RUNNER_TEMP/WaterValveDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Boot simulator
        run: |
          xcrun simctl boot "$SIMULATOR_ID" || true
          xcrun simctl bootstatus "$SIMULATOR_ID" -b

      - name: Install and launch simulator app
        run: |
          APP_PATH="$(find "$RUNNER_TEMP/WaterValveDerivedData/Build/Products" -path '*Debug-iphonesimulator/WaterValve.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "Simulator app bundle not found" >&2
            exit 1
          fi
          xcrun simctl install "$SIMULATOR_ID" "$APP_PATH"
          xcrun simctl launch "$SIMULATOR_ID" com.hgu.watervalve.ios
          sleep 5
          xcrun simctl terminate "$SIMULATOR_ID" com.hgu.watervalve.ios

      - name: Capture simulator log
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/WaterValveSimulator"
          log show --style compact --last 10m --predicate 'process == "WaterValve"' > "$RUNNER_TEMP/WaterValveSimulator/WaterValve-simulator.log" || true

      - name: Archive app
        run: |
          xcodebuild archive \
            -project ios/WaterValve.xcodeproj \
            -scheme WaterValve \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/WaterValve.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        run: |
          APP_PATH="$RUNNER_TEMP/WaterValve.xcarchive/Products/Applications/WaterValve.app"
          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/WaterValve.app"
          cd "$RUNNER_TEMP"
          ditto -c -k --sequesterRsrc --keepParent Payload WaterValve-unsigned.ipa

      - name: Package archive
        run: |
          cd "$RUNNER_TEMP"
          ditto -c -k --sequesterRsrc --keepParent WaterValve.xcarchive WaterValve-xcarchive.zip

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaterValve-ios-unsigned-ipa
          path: ${{ runner.temp }}/WaterValve-unsigned.ipa
          retention-days: 30

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaterValve-ios-archive
          path: ${{ runner.temp }}/WaterValve-xcarchive.zip
          retention-days: 30

      - name: Upload shared framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaterValve-shared-framework
          path: |
            shared/build/bin/iosArm64/debugFramework/Shared.framework
            shared/build/bin/iosArm64/releaseFramework/Shared.framework
            shared/build/bin/iosSimulatorArm64/debugFramework/Shared.framework
            shared/build/bin/iosSimulatorArm64/releaseFramework/Shared.framework
            shared/build/bin/iosX64/debugFramework/Shared.framework
            shared/build/bin/iosX64/releaseFramework/Shared.framework
          if-no-files-found: warn
          retention-days: 30

      - name: Upload static validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WaterValve-ios-static-validation
          path: ios/logs/ios-static-validation.txt
          retention-days: 30

      - name: Upload simulator log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WaterValve-ios-simulator-log
          path: ${{ runner.temp }}/WaterValveSimulator/WaterValve-simulator.log
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/WaterValve-unsigned.ipa
            ${{ runner.temp }}/WaterValve-xcarchive.zip
